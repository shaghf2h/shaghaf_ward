<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لك وحدك 🌹</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0a0010;
    font-family: 'Tajawal', sans-serif;
    overflow-x: hidden;
    cursor: default;
  }

  /* Stars background */
  #stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* Petals layer */
  #petals-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    width: 10px;
    height: 14px;
    border-radius: 80% 0 55% 0;
    opacity: 0;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(-40px) rotate(0deg); opacity: 0.9; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem 5rem;
    gap: 2.5rem;
  }

  .rose-top {
    font-size: 4.5rem;
    animation: pulse 2.5s ease-in-out infinite;
    filter: drop-shadow(0 0 24px #ff2d5588);
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  .card {
    background: linear-gradient(145deg, rgba(80,0,40,0.65), rgba(20,0,30,0.80));
    border: 1px solid rgba(255,80,120,0.25);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    max-width: 680px;
    width: 100%;
    box-shadow: 0 0 60px rgba(255,30,90,0.15), 0 0 120px rgba(180,0,80,0.08);
    backdrop-filter: blur(12px);
  }

  .poem {
    font-family: 'Amiri', serif;
    font-size: 1.45rem;
    line-height: 2.4;
    color: #ffd6e7;
    text-align: center;
    direction: rtl;
    letter-spacing: 0.03em;
  }

  .poem .line {
    display: block;
    opacity: 0;
    transform: translateY(18px);
    animation: fadeUp 0.8s ease forwards;
  }

  .poem .line:nth-child(1)  { animation-delay: 0.3s; }
  .poem .line:nth-child(2)  { animation-delay: 0.7s; }
  .poem .line:nth-child(3)  { animation-delay: 1.1s; }
  .poem .line:nth-child(4)  { animation-delay: 1.5s; }
  .poem .line:nth-child(5)  { animation-delay: 1.9s; }
  .poem .line:nth-child(6)  { animation-delay: 2.3s; }
  .poem .line:nth-child(7)  { animation-delay: 2.7s; }
  .poem .line:nth-child(8)  { animation-delay: 3.1s; }
  .poem .line:nth-child(9)  { animation-delay: 3.5s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .divider {
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,80,130,0.5), transparent);
    margin: 1.5rem auto;
  }

  /* Secret button */
  .secret-btn {
    position: relative;
    margin-top: 0.5rem;
    padding: 1rem 2.5rem;
    font-family: 'Tajawal', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, #c80050, #8b0030);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    box-shadow: 0 4px 30px rgba(200,0,80,0.5);
    letter-spacing: 0.04em;
    direction: rtl;
    overflow: hidden;
  }

  .secret-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #ff2d6d, #c80050);
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: inherit;
  }

  .secret-btn:hover::before { opacity: 1; }
  .secret-btn:hover { transform: scale(1.07); box-shadow: 0 6px 40px rgba(255,30,100,0.7); }
  .secret-btn:active { transform: scale(0.96); }

  .secret-btn span { position: relative; z-index: 1; }

  /* Video modal */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1.5rem;
  }

  .overlay.active { display: flex; }

  .video-box {
    background: #1a0020;
    border: 1px solid rgba(255,80,120,0.3);
    border-radius: 18px;
    overflow: hidden;
    max-width: 90vw;
    width: 480px;
    box-shadow: 0 0 60px rgba(255,30,100,0.3);
  }

  .video-box video {
    width: 100%;
    display: block;
  }

  .close-btn {
    color: #ff5588;
    background: rgba(255,80,130,0.12);
    border: 1px solid rgba(255,80,130,0.3);
    padding: 0.55rem 2rem;
    border-radius: 50px;
    cursor: pointer;
    font-size: 1rem;
    font-family: 'Tajawal', sans-serif;
    transition: background 0.2s;
  }
  .close-btn:hover { background: rgba(255,80,130,0.25); }

  /* Footer note */
  .footer-note {
    color: rgba(255,180,200,0.4);
    font-size: 0.82rem;
    text-align: center;
    letter-spacing: 0.06em;
  }

  /* Floating hearts on click */
  .click-heart {
    position: fixed;
    font-size: 1.8rem;
    pointer-events: none;
    z-index: 200;
    animation: floatUp 1.4s ease forwards;
  }

  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(0.8); }
    100% { opacity: 0; transform: translateY(-120px) scale(1.4); }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="petals-layer"></div>

<div class="content">
  <div class="rose-top">🌹</div>

  <div class="card">
    <div class="poem">
      <span class="line">صَحْ أَنْتِ أَحْلَىٰ مِنِ الْبَنَاتِ</span>
      <span class="line">وَأَنْتِ أَحْلَىٰ مِنِ الْوُرُودِ</span>
      <div class="divider"></div>
      <span class="line">شْوَيَّة عِينِي تْسَاهِلِي</span>
      <span class="line">كِلْشِي لِچْ .. وَأَنَا بَسِ الْمَاكُو لِي</span>
      <div class="divider"></div>
      <span class="line">أَنْتِ وَرْدَة جُورِي حَمْرَه</span>
      <span class="line">وَأَنَا ذَابِلْ بِيَّه</span>
      <div class="divider"></div>
      <span class="line">فَقْرِ الدَّمْ وِرَاثِي وِمِنْجَلِي</span>
    </div>
  </div>

  <button class="secret-btn" onclick="openVideo()">
    <span>🌹 حبيبي انت وردتي كمل!🌹</span>
  </button>

  <p class="footer-note">صُنع بكل الحب 🌹</p>
</div>

<!-- Video Modal -->
<div class="overlay" id="overlay">
  <div class="video-box">
    <video id="mainVideo" controls autoplay>
      <source src="1234.mp4" type="video/mp4">
      المتصفح لا يدعم الفيديو
    </video>
  </div>
  <button class="close-btn" onclick="closeVideo()">✕ إغلاق</button>
</div>

<script>
// === Stars ===
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

for (let i = 0; i < 200; i++) {
  stars.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.4 + 0.3,
    a: Math.random(),
    speed: Math.random() * 0.008 + 0.002,
    phase: Math.random() * Math.PI * 2
  });
}

function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const s of stars) {
    const alpha = 0.3 + 0.7 * Math.abs(Math.sin(t * s.speed + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,210,230,${alpha})`;
    ctx.fill();
  }
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

// === Petals ===
const petalLayer = document.getElementById('petals-layer');
const colors = ['#ff2255','#ff5577','#ff88aa','#ff3366','#cc1144','#ff99bb'];

function spawnPetal() {
  const p = document.createElement('div');
  p.className = 'petal';
  const x = Math.random() * 110 - 5;
  const dur = 4 + Math.random() * 5;
  const delay = Math.random() * 6;
  const size = 8 + Math.random() * 10;
  p.style.cssText = `
    left:${x}%;
    width:${size}px;
    height:${size * 1.4}px;
    background:${colors[Math.floor(Math.random()*colors.length)]};
    animation-duration:${dur}s;
    animation-delay:${delay}s;
    opacity:0.85;
    transform:rotate(${Math.random()*40-20}deg);
  `;
  petalLayer.appendChild(p);
  setTimeout(() => p.remove(), (dur + delay) * 1000 + 500);
}

for (let i = 0; i < 30; i++) spawnPetal();
setInterval(spawnPetal, 600);

// === Video ===
function openVideo() {
  document.getElementById('overlay').classList.add('active');
}

function closeVideo() {
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('mainVideo').pause();
}

// === Click hearts ===
document.addEventListener('click', function(e) {
  if (e.target.closest('.secret-btn') || e.target.closest('.overlay')) return;
  const hearts = ['❤️','💕','🌹','💖','💗'];
  const el = document.createElement('div');
  el.className = 'click-heart';
  el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
  el.style.left = e.clientX + 'px';
  el.style.top = e.clientY + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);
});
</script>
</body>
</html>
